<!-- FULL STACK READY FRONTEND (ADVANCED VERSION) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBrothers Pro Store</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#0f172a;color:#fff}
.navbar{background:#020617}
.hero{background:linear-gradient(90deg,#22c55e,#06b6d4);padding:60px;text-align:center}
.card:hover{transform:scale(1.05);transition:.3s}
.modal{color:black}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand">BBrothers</a>
<input class="form-control w-25" id="search">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" onclick="show('home')">Home</a></li>
<li class="nav-item"><a class="nav-link" onclick="show('cart')">Cart (<span id="count">0</span>)</a></li>
</ul>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<h1>Welcome to BBrothers</h1>
<button class="btn btn-dark" onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<div class="container mt-4" id="products">
<div class="row" id="grid"></div>
</div>

<!-- CART -->
<div class="container mt-4" id="cart" style="display:none">
<h2>Cart</h2>
<ul id="cartList" class="list-group"></ul>
<h3>Total ₹<span id="total"></span></h3>
<button class="btn btn-success" onclick="checkout()">Checkout</button>
</div>

<!-- MODAL PRODUCT DETAILS -->
<div class="modal fade" id="productModal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h4 id="pName"></h4>
<img id="pImg" class="img-fluid">
<p id="pPrice"></p>
<button class="btn btn-success" onclick="addToCart(currentId)">Add to Cart</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let products=[
{id:1,name:'Laptop',price:50000,img:'https://via.placeholder.com/200'},
{id:2,name:'Phone',price:10000,img:'https://via.placeholder.com/200'},
{id:3,name:'Shoes',price:2000,img:'https://via.placeholder.com/200'}
];

let cart=JSON.parse(localStorage.getItem('cart'))||[];
let currentId=null;

function render(){
let grid=document.getElementById('grid');
grid.innerHTML='';
products.forEach(p=>{
let col=document.createElement('div');
col.className='col-md-4';
col.innerHTML=`
<div class="card p-3">
<img src="${p.img}" onclick="view(${p.id})">
<h5>${p.name}</h5>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})" class="btn btn-success">Add</button>
</div>`;
grid.appendChild(col);
});
}

function view(id){
let p=products.find(x=>x.id===id);
currentId=id;
document.getElementById('pName').innerText=p.name;
document.getElementById('pImg').src=p.img;
document.getElementById('pPrice').innerText='₹'+p.price;
new bootstrap.Modal(document.getElementById('productModal')).show();
}

function addToCart(id){
let item=products.find(p=>p.id===id);
cart.push(item);
localStorage.setItem('cart',JSON.stringify(cart));
updateCart();
}

function updateCart(){
let list=document.getElementById('cartList');
let total=0;
list.innerHTML='';
cart.forEach((i,index)=>{
let li=document.createElement('li');
li.className='list-group-item d-flex justify-content-between';
li.innerHTML=`${i.name} ₹${i.price} <button onclick="remove(${index})">X</button>`;
list.appendChild(li);
total+=i.price;
});
document.getElementById('total').innerText=total;
document.getElementById('count').innerText=cart.length;
}

function remove(i){cart.splice(i,1);localStorage.setItem('cart',JSON.stringify(cart));updateCart();}

function show(page){
document.getElementById('home').style.display=page==='home'?'block':'none';
document.getElementById('cart').style.display=page==='cart'?'block':'none';
}

function checkout(){alert('Payment Successful (Demo)');cart=[];localStorage.clear();updateCart();}

function scrollToProducts(){window.scrollTo({top:300,behavior:'smooth'});}

render();updateCart();
</script>

</body>
</html>
