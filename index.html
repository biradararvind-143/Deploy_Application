<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBrothers Advanced Store</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{margin:0;font-family:Arial;color:white;animation:bg 12s infinite alternate}
@keyframes bg{
0%{background:linear-gradient(45deg,#0f172a,#1e293b)}
50%{background:linear-gradient(45deg,#1e3a8a,#0ea5e9)}
100%{background:linear-gradient(45deg,#065f46,#10b981)}
}
header{text-align:center;padding:15px;font-size:28px;font-weight:bold}
nav{text-align:center}
nav a{margin:10px;cursor:pointer}
section{display:none;padding:20px}
.active{display:block}

.form-box{background:white;color:black;padding:20px;border-radius:10px;max-width:350px;margin:auto}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:10px;background:#10b981;border:none}

.controls{display:flex;gap:10px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:white;color:black;padding:10px;border-radius:10px;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:150px;object-fit:cover}
.price{color:green;font-weight:bold}
</style>
</head>
<body>

<header>BBrothers 🛒</header>

<!-- LOGIN -->
<section id="login" class="active">
<div class="form-box">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="show('register')">Register</p>
</div>
</section>

<!-- REGISTER -->
<section id="register">
<div class="form-box">
<h2>Register</h2>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>
</div>
</section>

<!-- HOME -->
<section id="home">
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('products')">Shop</a>
<a onclick="show('cart')">Cart (<span id="count">0</span>)</a>
<a onclick="logout()">Logout</a>
</nav>
<h2>Welcome to BBrothers Store</h2>
</section>

<!-- PRODUCTS -->
<section id="products">
<div class="controls">
<input type="text" id="search" placeholder="Search" onkeyup="render()">
<select id="filter" onchange="render()">
<option value="all">All</option>
<option value="Fashion">Fashion</option>
<option value="Electronics">Electronics</option>
</select>
</div>
<div class="grid" id="productGrid"></div>
</section>

<!-- CART -->
<section id="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<h3>Total ₹<span id="total"></span></h3>
</section>

<script>
// JWT Simulation
function generateToken(user){return btoa(user+":"+Date.now());}

let cart=JSON.parse(localStorage.getItem('cart'))||[];
let token=localStorage.getItem('token');

const products=[
{name:'T-Shirt',price:500,cat:'Fashion',img:'https://picsum.photos/200?1'},
{name:'Headphones',price:1500,cat:'Electronics',img:'https://picsum.photos/200?2'},
{name:'Shoes',price:2000,cat:'Fashion',img:'https://picsum.photos/200?3'}
];

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==='products') render();
if(id==='cart') update();
}

function register(){
let email=regEmail.value;
let pass=btoa(regPass.value);
localStorage.setItem(email,pass);
alert('Registered');
show('login');
}

function login(){
let email=loginEmail.value;
let pass=btoa(loginPass.value);
if(localStorage.getItem(email)==pass){
let t=generateToken(email);
localStorage.setItem('token',t);
show('home');
}else alert('Invalid');
}

function logout(){localStorage.removeItem('token');show('login');}

function render(){
let grid=document.getElementById('productGrid');
let search=document.getElementById('search').value.toLowerCase();
let filter=document.getElementById('filter').value;

grid.innerHTML='';
products.filter(p=>
(p.name.toLowerCase().includes(search)) &&
(filter==='all'||p.cat===filter)
).forEach(p=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
<p>⭐ ${(Math.random()*5).toFixed(1)}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>`;
grid.appendChild(div);
});
}

function add(name,price){
cart.push({name,price});
localStorage.setItem('cart',JSON.stringify(cart));
update();
}

function update(){
let list=document.getElementById('cartItems');
list.innerHTML='';
let total=0;
cart.forEach((i,index)=>{
let li=document.createElement('li');
li.innerHTML=`${i.name} ₹${i.price} <button onclick="remove(${index})">X</button>`;
list.appendChild(li);
total+=i.price;
});
document.getElementById('total').innerText=total;
document.getElementById('count').innerText=cart.length;
}

function remove(i){
cart.splice(i,1);
localStorage.setItem('cart',JSON.stringify(cart));
update();
}
</script>

</body>
</html>
